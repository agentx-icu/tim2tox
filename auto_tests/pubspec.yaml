name: tim2tox_auto_tests
description: "Automated tests for tim2tox Dart layer interfaces in binary replacement mode"
version: 0.1.0
publish_to: "none"
license: GPL-3.0

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  test: ^1.24.0
  tencent_cloud_chat_sdk:
    # Bootstrap vendors the SDK into third_party/tencent_cloud_chat_sdk (no
    # version suffix); the legacy sibling-dir path used a hardcoded
    # `-8.7.7201` suffix that no longer exists post-bootstrap.
    path: ../../tencent_cloud_chat_sdk
  tim2tox_dart:
    path: ../dart
  path_provider: ^2.1.3
  path: ^1.8.3
  shared_preferences: ^2.2.2
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

dependency_overrides:
  tencent_cloud_chat_sdk:
    # Bootstrap vendors the SDK into third_party/tencent_cloud_chat_sdk (no
    # version suffix); the legacy sibling-dir path used a hardcoded
    # `-8.7.7201` suffix that no longer exists post-bootstrap.
    path: ../../tencent_cloud_chat_sdk
  # tim2tox/dart imports tencent_cloud_chat_common/external/chat_message_provider.dart,
  # which only exists in the agentx-icu/chat-uikit-flutter fork. Without
  # this override `flutter test` resolves the public pub.dev package and
  # fails to compile tim2tox_sdk_platform.dart. Mirror toxee's overrides
  # at toxee/pubspec_overrides.yaml.
  tencent_cloud_chat_common:
    path: ../../chat-uikit-flutter/tencent_cloud_chat_common
